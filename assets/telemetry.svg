<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="840" height="240" viewBox="0 0 840 240" role="img" aria-label="Live hyperloop telemetry panel: a pod accelerates along the tube from Zurich to Groningen, latency graph holds at 11 milliseconds, all subsystem LEDs green. European Hyperloop Week 2024 and 2025 — placed 8th of 16 with a crew of 9.">
  <title>vegapodctl --live — MVCU telemetry</title>
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".38"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity=".16"/>
    </pattern>
  </defs>
  <style>
    text{font-family:ui-monospace,'Cascadia Mono','Cascadia Code',Menlo,Consolas,'Liberation Mono',monospace;font-size:12px;fill:#b8e6c4}
    .dim{fill:#5c7a66}.hi{fill:#4afa7b}.amb{fill:#ffb000}.wht{fill:#d9ffe6}
    .pod{filter:drop-shadow(0 0 6px #00ff41);animation:pod 3.8s cubic-bezier(.55,.055,.675,.19) infinite}
    @keyframes pod{0%{transform:translate(-70px,78px);opacity:1}62%{transform:translate(620px,78px);opacity:1}68%{transform:translate(660px,78px);opacity:0}100%{transform:translate(660px,78px);opacity:0}}
    .trace{stroke-dasharray:640;animation:dash 5.2s linear infinite}
    @keyframes dash{0%{stroke-dashoffset:640}72%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    .led{animation:pulse 2.1s ease-in-out infinite}
    .p1{animation-delay:.2s}.p2{animation-delay:.6s}.p3{animation-delay:1s}.p4{animation-delay:1.4s}
    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    .comms{animation:blip 7s steps(1,end) infinite}
    @keyframes blip{0%,88%{fill:#4afa7b}89%,93%{fill:#ffb000}94%,100%{fill:#4afa7b}}
    .hb{animation:pulse 1s ease-in-out infinite}
    @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important}}
  </style>
  <rect width="840" height="240" rx="16" fill="#101612"/>
  <rect x="6" y="6" width="828" height="228" rx="10" fill="#0a0f0c" stroke="#1d2a22"/>
  <circle cx="30" cy="26" r="6" fill="#ff5f56"/><circle cx="52" cy="26" r="6" fill="#ffbd2e"/><circle cx="74" cy="26" r="6" fill="#27c93f"/>
  <text x="420" y="30" text-anchor="middle" class="dim">vegapodctl --live — MVCU telemetry</text>
  <line x1="6" y1="44" x2="834" y2="44" stroke="#1d2a22"/>

  <text x="36" y="64" class="dim">TUBE SECTION <tspan class="wht">ZRH</tspan> → <tspan class="wht">GRQ</tspan></text>
  <line x1="36" y1="84" x2="600" y2="84" stroke="#23392c" stroke-dasharray="6 4"/>
  <line x1="36" y1="76" x2="36" y2="92" stroke="#35563f"/>
  <line x1="600" y1="76" x2="600" y2="92" stroke="#35563f"/>
  <g clip-path="none">
    <g class="pod">
      <rect x="-40" y="1" width="14" height="10" rx="5" fill="#4afa7b" opacity=".14"/>
      <rect x="-22" y="0" width="16" height="12" rx="6" fill="#4afa7b" opacity=".32"/>
      <rect x="0" y="0" width="44" height="12" rx="6" fill="#4afa7b"/>
    </g>
  </g>
  <text x="36" y="114" class="dim">VEL <tspan class="wht">480 km/h</tspan> · E2E <tspan class="hi">11 ms</tspan> · LOSS <tspan class="wht">0.0%</tspan> · HB <tspan class="hb hi">●</tspan></text>

  <rect x="36" y="126" width="564" height="82" fill="none" stroke="#23392c"/>
  <text x="44" y="144" class="dim" font-size="10">E2E LATENCY (ms)</text>
  <line x1="36" y1="168" x2="600" y2="168" stroke="#1d3a2a" stroke-dasharray="3 5"/>
  <text x="594" y="164" text-anchor="end" class="dim" font-size="10">11</text>
  <polyline class="trace" points="40,169 80,166 120,170 160,165 200,171 240,167 280,169 320,163 360,170 400,166 440,169 480,164 520,169 560,167 596,168" fill="none" stroke="#4afa7b" stroke-width="1.5"/>

  <text x="628" y="64" class="dim">SUBSYSTEMS</text>
  <circle class="led" cx="634" cy="82" r="5" fill="#4afa7b"/><text x="650" y="87">NAV</text>
  <circle class="led p1" cx="634" cy="104" r="5" fill="#4afa7b"/><text x="650" y="109">CTRL</text>
  <circle class="comms" cx="634" cy="126" r="5" fill="#4afa7b"/><text x="650" y="131">COMMS</text>
  <circle class="led p2" cx="634" cy="148" r="5" fill="#4afa7b"/><text x="650" y="153">PWR</text>
  <circle class="led p3" cx="634" cy="170" r="5" fill="#4afa7b"/><text x="650" y="175">SAFETY</text>

  <text x="628" y="202" class="wht" font-size="11">EHW '24 ZURICH · '25 GRONINGEN</text>
  <text x="628" y="222" class="amb" font-size="11">PLACED 8TH/16 — CREW OF 9</text>

  <rect x="6" y="6" width="828" height="228" rx="10" fill="url(#scan)" opacity=".5"/>
  <rect x="6" y="6" width="828" height="228" rx="10" fill="url(#vig)"/>
</svg>
