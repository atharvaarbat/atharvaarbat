<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="840" height="170" viewBox="0 0 840 170" role="img" aria-label="CRT monitor powering on and displaying: ATHARVA ARBAT — systems programmer and AI agent engineer">
  <title>ATHARVA ARBAT — systems programmer × AI agent engineer</title>
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".38"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity=".16"/>
    </pattern>
    <filter id="blur6" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <style>
    text{font-family:ui-monospace,'Cascadia Mono','Cascadia Code',Menlo,Consolas,'Liberation Mono',monospace}
    .crt{animation:flick .6s steps(1,end) forwards}
    @keyframes flick{0%{opacity:0}8%{opacity:.85}16%{opacity:.1}30%{opacity:1}42%{opacity:.35}55%,100%{opacity:1}}
    .sync{animation:sweep .8s cubic-bezier(.165,.84,.44,1) .15s forwards;opacity:0}
    @keyframes sweep{0%{transform:translateY(0);opacity:.85}100%{transform:translateY(168px);opacity:0}}
    .in1{opacity:0;animation:on .01s steps(1) .65s forwards}
    .in2{opacity:0;animation:on .01s steps(1) .95s forwards}
    .in3{opacity:0;animation:on .01s steps(1) 1.25s forwards}
    @keyframes on{to{opacity:1}}
    .glow{animation:pulse 3.4s ease-in-out .7s infinite alternate;opacity:.4}
    @keyframes pulse{from{opacity:.35}to{opacity:.75}}
    .cur{animation:on .01s steps(1) .65s forwards,blink 1.06s steps(1,end) 1.6s infinite;opacity:0}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important}}
  </style>
  <rect width="840" height="170" rx="16" fill="#101612"/>
  <rect x="6" y="6" width="828" height="158" rx="10" fill="#0a0f0c" stroke="#1d2a22"/>
  <g class="crt">
    <text class="glow" x="420" y="84" text-anchor="middle" font-size="52" font-weight="700" letter-spacing="4" fill="#00ff41" filter="url(#blur6)">ATHARVA ARBAT</text>
    <text class="in1" x="420" y="84" text-anchor="middle" font-size="52" font-weight="700" letter-spacing="4" fill="#d9ffe6">ATHARVA ARBAT<tspan class="cur" fill="#4afa7b">▊</tspan></text>
    <text class="in2" x="420" y="116" text-anchor="middle" font-size="13" letter-spacing="7" fill="#ffb000">SYSTEMS PROGRAMMER ⨯ AI AGENT ENGINEER</text>
    <text class="in3" x="420" y="142" text-anchor="middle" font-size="12" letter-spacing="1" fill="#5c7a66">hyperloop firmware @ 11 ms · x86 kernel on real hardware · 49k ops/sec KV · 6-agent orchestra</text>
  </g>
  <rect class="sync" x="6" y="4" width="828" height="3" rx="1.5" fill="#b6ffd0"/>
  <rect x="6" y="6" width="828" height="158" rx="10" fill="url(#scan)" opacity=".55"/>
  <rect x="6" y="6" width="828" height="158" rx="10" fill="url(#vig)"/>
</svg>
